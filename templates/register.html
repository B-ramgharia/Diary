{% extends "layout.html" %}

{% block content %}
<div class="max-w-md mx-auto px-6 min-h-[80vh] flex flex-col justify-center">
    <div class="glass p-10 rounded-3xl shadow-2xl border-white/10 relative overflow-hidden">
        <!-- Glow -->
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-pink-500/20 blur-[80px]"></div>
        
        <div class="text-center mb-10">
            <h2 class="text-4xl font-black text-white mb-2 tracking-tight">Create Your <span class="bg-gradient-to-r from-pink-400 to-rose-400 bg-clip-text text-transparent">Account</span></h2>
            <p class="text-slate-400">Join our community of mindful writers.</p>
        </div>

        <form method="POST" action="/register" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-2 text-slate-400">Username</label>
                <div class="relative">
                    <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                    <input type="text" name="username" required
                        class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-4 py-4 focus:border-indigo-500 outline-none transition-all text-white placeholder-slate-600"
                        placeholder="johndoe">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium mb-2 text-slate-400">Email Address</label>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                    <input type="email" name="email" required
                        class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-4 py-4 focus:border-indigo-500 outline-none transition-all text-white placeholder-slate-600"
                        placeholder="you@example.com">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium mb-2 text-slate-400">Password</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                    <input type="password" name="password" required
                        class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-4 py-4 focus:border-indigo-500 outline-none transition-all text-white placeholder-slate-600"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" 
                class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-bold text-lg shadow-xl shadow-indigo-600/20 transition-all active:scale-95 flex items-center justify-center space-x-2 mt-4">
                <span>Register</span>
                <i data-lucide="sparkles" class="w-5 h-5"></i>
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-slate-500 text-sm">
                Already have an account? <a href="/login" class="text-indigo-400 font-bold hover:underline">Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
